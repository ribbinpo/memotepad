<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- App tile gradient: uplifting blue -> violet -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6E8BFF"/>
      <stop offset="0.55" stop-color="#6C6BF6"/>
      <stop offset="1" stop-color="#8A4DF0"/>
    </linearGradient>
    <!-- Soft top sheen for depth -->
    <radialGradient id="sheen" cx="0.5" cy="0.12" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Up-arrow badge: fresh green -->
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3EE0A6"/>
      <stop offset="1" stop-color="#16B98A"/>
    </linearGradient>
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#1a1030" flood-opacity="0.35"/>
    </filter>
    <filter id="cardShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#241a4d" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Rounded-square app tile on the macOS icon grid (824x824, centered) -->
  <g filter="url(#tileShadow)">
    <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#bg)"/>
    <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#sheen)"/>
  </g>

  <!-- Note card -->
  <g filter="url(#cardShadow)">
    <rect x="297" y="277" width="430" height="470" rx="42" ry="42" fill="#ffffff"/>
  </g>

  <!-- Text lines: accent title + gray body -->
  <rect x="343" y="350" width="210" height="32" rx="16" fill="#6C6BF6"/>
  <rect x="343" y="424" width="338" height="22" rx="11" fill="#D3DAEC"/>
  <rect x="343" y="472" width="338" height="22" rx="11" fill="#D3DAEC"/>
  <rect x="343" y="520" width="222" height="22" rx="11" fill="#D3DAEC"/>

  <!-- Up-arrow badge, lifting off the note's top-right corner -->
  <circle cx="727" cy="290" r="94" fill="#ffffff"/>
  <circle cx="727" cy="290" r="84" fill="url(#badge)"/>
  <path d="M727 250 L686 296 L710 296 L710 334 L744 334 L744 296 L768 296 Z" fill="#ffffff"/>
</svg>
